<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="70" y1="280" x2="520" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="70" y2="280" stroke="#333" stroke-width="1.5"/>
  <text x="295" y="320" text-anchor="middle" font-size="14" fill="#333">running variable X (e.g. risk score)</text>
  <text x="28" y="160" text-anchor="middle" font-size="14" fill="#333" transform="rotate(-90 28 160)">outcome E[Y]</text>

  <!-- Cutoff line -->
  <line x1="295" y1="40" x2="295" y2="280" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="295" y="34" text-anchor="middle" font-size="12" fill="#777">cutoff c</text>
  <text x="180" y="300" text-anchor="middle" font-size="12" fill="#1f9d55">untreated (X &lt; c)</text>
  <text x="410" y="300" text-anchor="middle" font-size="12" fill="#cc3b3b">treated (X &#8805; c)</text>

  <!-- Left regression (control) -->
  <path d="M100,235 Q200,210 290,195" fill="none" stroke="#1f9d55" stroke-width="2.5"/>
  <!-- Right regression (treated), jumps up at cutoff -->
  <path d="M300,150 Q400,128 490,105" fill="none" stroke="#cc3b3b" stroke-width="2.5"/>

  <!-- Scatter points left -->
  <circle cx="120" cy="240" r="3" fill="#1f9d55" opacity="0.6"/>
  <circle cx="155" cy="222" r="3" fill="#1f9d55" opacity="0.6"/>
  <circle cx="190" cy="218" r="3" fill="#1f9d55" opacity="0.6"/>
  <circle cx="230" cy="205" r="3" fill="#1f9d55" opacity="0.6"/>
  <circle cx="265" cy="202" r="3" fill="#1f9d55" opacity="0.6"/>
  <!-- Scatter points right -->
  <circle cx="320" cy="148" r="3" fill="#cc3b3b" opacity="0.6"/>
  <circle cx="355" cy="140" r="3" fill="#cc3b3b" opacity="0.6"/>
  <circle cx="395" cy="128" r="3" fill="#cc3b3b" opacity="0.6"/>
  <circle cx="435" cy="118" r="3" fill="#cc3b3b" opacity="0.6"/>
  <circle cx="470" cy="108" r="3" fill="#cc3b3b" opacity="0.6"/>

  <!-- Discontinuity gap at cutoff -->
  <circle cx="293" cy="194" r="4" fill="none" stroke="#1f9d55" stroke-width="1.5"/>
  <circle cx="297" cy="150" r="4" fill="#cc3b3b"/>
  <line x1="320" y1="150" x2="320" y2="193" stroke="#333" stroke-width="1.5" marker-end="url(#ar2)" marker-start="url(#ar2)"/>
  <text x="332" y="176" font-size="14" fill="#333" font-style="italic">&#964;</text>
  <text x="332" y="190" font-size="10" fill="#777">LATE at c</text>
</svg>
