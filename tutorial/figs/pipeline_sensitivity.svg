<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 880" font-family="Helvetica, Arial, sans-serif">
  <style>
    /* Connectors / arrows */
    .conn { stroke: #6d6e71; }
    .conn-mk { fill: #6d6e71; }
    /* Grey (start / estimate) - logo grey */
    .blue-b { fill: #eceded; stroke: #8a8b8e; }
    .blue-t { fill: #42434a; }
    /* Grey (diagnostic checks) - logo grey */
    .cyan-b { fill: #eceded; stroke: #8a8b8e; }
    .cyan-t { fill: #42434a; }
    .cyan-s { fill: #5f6066; }
    /* Limegreen (decision diamond) */
    .amber-b { fill: #eef3dd; stroke: #7d9f17; }
    .amber-t { fill: #3d4f10; }
    /* Red (remedy) */
    .red-b { fill: #fdecea; stroke: #e53935; }
    .red-t { fill: #8e1d18; }
    .red-s { fill: #a8332c; }
    /* Limegreen (report) */
    .green-b2 { fill: #eef3dd; stroke: #7d9f17; }
    .green-t { fill: #3d4f10; }
    /* Decision labels */
    .fail-t { fill: #c62828; }
    .pass-t { fill: #5b7510; }

    @media (prefers-color-scheme: dark) {
      .conn { stroke: #9aa4af; }
      .conn-mk { fill: #9aa4af; }
      .blue-b { fill: #1b1f24; stroke: #7c7e85; }
      .blue-t { fill: #c9cdd3; }
      .cyan-b { fill: #1b1f24; stroke: #7c7e85; }
      .cyan-t { fill: #c9cdd3; }
      .cyan-s { fill: #a7abb2; }
      .amber-b { fill: #1f2a10; stroke: #aacb3f; }
      .amber-t { fill: #cfe39a; }
      .red-b { fill: #3a1715; stroke: #f06a66; }
      .red-t { fill: #ffb3ae; }
      .red-s { fill: #f0918c; }
      .green-b2 { fill: #1f2a10; stroke: #aacb3f; }
      .green-t { fill: #cfe39a; }
      .fail-t { fill: #f06a66; }
      .pass-t { fill: #aacb3f; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path class="conn-mk" d="M0,0 L8,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- ===================== Boxes ===================== -->
  <!-- A: start / adjusted estimate -->
  <rect class="blue-b" x="360" y="24" width="360" height="58" rx="8" stroke-width="1.6"/>
  <text class="blue-t" x="540" y="49" text-anchor="middle" font-size="14" font-weight="bold">Adjusted effect estimate</text>
  <text class="blue-t" x="540" y="68" text-anchor="middle" font-size="11">PS weighting &#183; matching &#183; outcome regression</text>

  <!-- C1: balance diagnostics -->
  <rect class="cyan-b" x="360" y="130" width="360" height="58" rx="8" stroke-width="1.6"/>
  <text class="cyan-t" x="540" y="155" text-anchor="middle" font-size="13.5" font-weight="bold">1 &#183; Balance diagnostics</text>
  <text class="cyan-s" x="540" y="174" text-anchor="middle" font-size="11">SMD &#183; Love plot &#183; variance ratios &#183; overlap</text>

  <!-- D1 diamond -->
  <polygon class="amber-b" points="540,200 662,250 540,300 418,250" stroke-width="1.6"/>
  <text class="amber-t" x="540" y="246" text-anchor="middle" font-size="12.5" font-weight="bold">Covariates balanced?</text>
  <text class="amber-t" x="540" y="263" text-anchor="middle" font-size="11">(all |SMD| &lt; 0.1)</text>

  <!-- R1 remedy -->
  <rect class="red-b" x="40" y="216" width="300" height="68" rx="8" stroke-width="1.6"/>
  <text class="red-t" x="190" y="240" text-anchor="middle" font-size="12.5" font-weight="bold">Re-specify the propensity model</text>
  <text class="red-s" x="190" y="259" text-anchor="middle" font-size="10.5">add splines / interactions &#183; trim non-overlap</text>
  <text class="red-s" x="190" y="274" text-anchor="middle" font-size="10.5">re-match or re-weight, then re-check</text>

  <!-- C2: falsification tests -->
  <rect class="cyan-b" x="360" y="340" width="360" height="58" rx="8" stroke-width="1.6"/>
  <text class="cyan-t" x="540" y="365" text-anchor="middle" font-size="13.5" font-weight="bold">2 &#183; Placebo &amp; falsification tests</text>
  <text class="cyan-s" x="540" y="384" text-anchor="middle" font-size="11">negative-control outcome / treatment &#183; pre-trend</text>

  <!-- D2 diamond -->
  <polygon class="amber-b" points="540,410 662,460 540,510 418,460" stroke-width="1.6"/>
  <text class="amber-t" x="540" y="456" text-anchor="middle" font-size="12.5" font-weight="bold">Placebo tests pass?</text>
  <text class="amber-t" x="540" y="473" text-anchor="middle" font-size="11">(effects &#8776; 0)</text>

  <!-- R2 remedy -->
  <rect class="red-b" x="40" y="426" width="300" height="68" rx="8" stroke-width="1.6"/>
  <text class="red-t" x="190" y="450" text-anchor="middle" font-size="12.5" font-weight="bold">Address residual confounding</text>
  <text class="red-s" x="190" y="469" text-anchor="middle" font-size="10.5">revisit the DAG &#183; add proxy / control variables</text>
  <text class="red-s" x="190" y="484" text-anchor="middle" font-size="10.5">consider an instrument or diff-in-diff design</text>

  <!-- C3: robustness to unmeasured confounding -->
  <rect class="cyan-b" x="360" y="550" width="360" height="58" rx="8" stroke-width="1.6"/>
  <text class="cyan-t" x="540" y="575" text-anchor="middle" font-size="13.5" font-weight="bold">3 &#183; Robustness to unmeasured U</text>
  <text class="cyan-s" x="540" y="594" text-anchor="middle" font-size="11">E-value &#183; partial R&#178; &#183; Rosenbaum &#915; &#183; Manski bounds</text>

  <!-- D3 diamond -->
  <polygon class="amber-b" points="540,620 662,670 540,720 418,670" stroke-width="1.6"/>
  <text class="amber-t" x="540" y="666" text-anchor="middle" font-size="12.5" font-weight="bold">Robust to a</text>
  <text class="amber-t" x="540" y="683" text-anchor="middle" font-size="12.5" font-weight="bold">plausible confounder?</text>

  <!-- R3 remedy -->
  <rect class="red-b" x="40" y="636" width="300" height="68" rx="8" stroke-width="1.6"/>
  <text class="red-t" x="190" y="660" text-anchor="middle" font-size="12.5" font-weight="bold">Treat the estimate as fragile</text>
  <text class="red-s" x="190" y="679" text-anchor="middle" font-size="10.5">gather more covariates &#183; report worst-case bounds</text>
  <text class="red-s" x="190" y="694" text-anchor="middle" font-size="10.5">temper the pricing / reserving decision</text>

  <!-- H: transparent report -->
  <rect class="green-b2" x="320" y="772" width="440" height="64" rx="8" stroke-width="1.8"/>
  <text class="green-t" x="540" y="798" text-anchor="middle" font-size="13.5" font-weight="bold">Transparent actuarial report</text>
  <text class="green-t" x="540" y="817" text-anchor="middle" font-size="11">estimate + diagnostics + sensitivity bounds + pricing / reserving impact</text>

  <!-- ===================== Arrows ===================== -->
  <!-- main vertical flow -->
  <line class="conn" x1="540" y1="82"  x2="540" y2="127" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line class="conn" x1="540" y1="188" x2="540" y2="198" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line class="conn" x1="540" y1="300" x2="540" y2="337" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line class="conn" x1="540" y1="398" x2="540" y2="408" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line class="conn" x1="540" y1="510" x2="540" y2="547" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line class="conn" x1="540" y1="608" x2="540" y2="618" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line class="conn" x1="540" y1="720" x2="540" y2="769" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Pass labels -->
  <text class="pass-t" x="556" y="324" font-size="12" font-weight="bold">Pass</text>
  <text class="pass-t" x="556" y="534" font-size="12" font-weight="bold">Pass</text>
  <text class="pass-t" x="556" y="744" font-size="12" font-weight="bold">Pass</text>

  <!-- D1 -> R1 (Fail) and loop back -->
  <line class="conn" x1="418" y1="250" x2="343" y2="250" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="fail-t" x="380" y="242" text-anchor="middle" font-size="12" font-weight="bold">Fail</text>
  <polyline class="conn" points="190,216 190,159 357,159" fill="none" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- D2 -> R2 (Fail) and loop back -->
  <line class="conn" x1="418" y1="460" x2="343" y2="460" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="fail-t" x="380" y="452" text-anchor="middle" font-size="12" font-weight="bold">Fail</text>
  <polyline class="conn" points="190,426 190,369 357,369" fill="none" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- D3 -> R3 (Fail) and loop back -->
  <line class="conn" x1="418" y1="670" x2="343" y2="670" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="fail-t" x="380" y="662" text-anchor="middle" font-size="12" font-weight="bold">Fail</text>
  <polyline class="conn" points="190,636 190,579 357,579" fill="none" stroke-width="1.6" marker-end="url(#arrow)"/>
</svg>
