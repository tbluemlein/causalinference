<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ax { stroke: #333; }
    .ink-l { stroke: #333; }
    .ink-t { fill: #333; }
    .muted { fill: #777; }
    .muted-l { stroke: #777; }
    @media (prefers-color-scheme: dark) {
      .ax { stroke: #c9d1d9; }
      .ink-l { stroke: #c9d1d9; }
      .ink-t { fill: #e6edf3; }
      .muted { fill: #9aa4af; }
      .muted-l { stroke: #9aa4af; }
    }
  </style>

  <text class="ink-t" x="280" y="24" text-anchor="middle" font-size="15" font-weight="bold">Rosenbaum bounds: when does significance break?</text>

  <!-- "Still significant" shaded band, only up to the critical Gamma (x=290) -->
  <rect x="70" y="227" width="220" height="73" fill="#7d9f17" opacity="0.12"/>
  <text x="80" y="252" font-size="11" fill="#7d9f17" font-weight="bold">still significant (p &lt; 0.05)</text>

  <!-- Axes -->
  <line class="ax" x1="70" y1="300" x2="520" y2="300" stroke-width="1.5"/>
  <line class="ax" x1="70" y1="50" x2="70" y2="300" stroke-width="1.5"/>

  <!-- x ticks: Gamma 1..3 -->
  <g font-size="11" class="muted" text-anchor="middle">
    <text x="70"  y="318">1.0</text>
    <text x="180" y="318">1.5</text>
    <text x="290" y="318">2.0</text>
    <text x="400" y="318">2.5</text>
    <text x="510" y="318">3.0</text>
  </g>
  <!-- y ticks: worst-case p-value 0..0.2 -->
  <g font-size="11" class="muted" text-anchor="end">
    <text x="62" y="304">0.00</text>
    <text x="62" y="241">0.05</text>
    <text x="62" y="178">0.10</text>
    <text x="62" y="116">0.15</text>
    <text x="62" y="54">0.20</text>
  </g>

  <text class="ink-t" x="295" y="344" text-anchor="middle" font-size="13">sensitivity parameter &#915; (allowed hidden bias)</text>
  <text class="ink-t" x="24" y="175" text-anchor="middle" font-size="13" transform="rotate(-90 24 175)">worst-case p-value</text>

  <!-- alpha = 0.05 threshold -->
  <line x1="70" y1="237.5" x2="520" y2="237.5" stroke="#d62728" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="514" y="231" font-size="11" fill="#d62728" text-anchor="end" font-weight="bold">&#945; = 0.05</text>

  <!-- worst-case p-value curve, rising with Gamma -->
  <path d="M70,297 C140,290 200,270 290,237.5 C360,200 440,120 510,66"
        fill="none" stroke="#7d9f17" stroke-width="2.8"/>

  <!-- critical Gamma marker at the crossing (Gamma* = 2.0) -->
  <line x1="290" y1="237.5" x2="290" y2="300" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.9"/>
  <circle cx="290" cy="237.5" r="6" fill="#D85A30" stroke="#ffffff" stroke-width="1.6"/>
  <text x="300" y="222" font-size="13" font-weight="bold" fill="#D85A30">&#915;* &#8776; 2.0</text>
  <text x="300" y="258" font-size="11" fill="#D85A30">survives bias up to here</text>
</svg>
