<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ink-l { stroke: #333; }
    .ink-t { fill: #333; }
    .muted { fill: #777; }
    .muted-l { stroke: #777; }
    .arrow { fill: #333; }
    @media (prefers-color-scheme: dark) {
      .ink-l { stroke: #c9d1d9; }
      .ink-t { fill: #e6edf3; }
      .muted { fill: #9aa4af; }
      .muted-l { stroke: #9aa4af; }
      .arrow { fill: #c9d1d9; }
    }
  </style>
  <defs>
    <marker id="arFair" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path class="arrow" d="M0,0 L9,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- F (Confounder) -->
  <circle cx="110" cy="60" r="30" fill="#eef1f4" stroke="#9aa4af" stroke-width="2"/>
  <text x="110" y="66" text-anchor="middle" font-size="18" fill="#3a4149">F</text>
  <text class="muted" x="110" y="22" text-anchor="middle" font-size="12">confounder</text>

  <!-- S (Sensitive) -->
  <circle cx="110" cy="210" r="32" fill="#fdecec" stroke="#cc3b3b" stroke-width="2"/>
  <text x="110" y="216" text-anchor="middle" font-size="20" fill="#8a1f1f">S</text>
  <text class="muted" x="110" y="266" text-anchor="middle" font-size="12">sensitive</text>

  <!-- X1 (Proxy) -->
  <circle cx="330" cy="110" r="32" fill="#fff7e6" stroke="#d9920a" stroke-width="2"/>
  <text x="330" y="111" text-anchor="middle" font-size="18" fill="#8a5b00">X&#8321;</text>
  <text class="muted" x="330" y="64" text-anchor="middle" font-size="12">proxy</text>

  <!-- X2 (Legitimate) -->
  <circle cx="330" cy="250" r="32" fill="#e8f7ee" stroke="#1f9d55" stroke-width="2"/>
  <text x="330" y="251" text-anchor="middle" font-size="18" fill="#136c3a">X&#8322;</text>
  <text class="muted" x="330" y="300" text-anchor="middle" font-size="12">legitimate risk factor</text>

  <!-- Y (Claim) -->
  <circle cx="540" cy="180" r="32" fill="#eef1f4" stroke="#9aa4af" stroke-width="2"/>
  <text x="540" y="186" text-anchor="middle" font-size="20" fill="#3a4149">Y</text>
  <text class="muted" x="540" y="236" text-anchor="middle" font-size="12">claim</text>

  <!-- F -> S -->
  <line class="ink-l" x1="110" y1="90" x2="110" y2="176" stroke-width="2" marker-end="url(#arFair)"/>
  <!-- F -> Y -->
  <line class="ink-l" x1="138" y1="72" x2="508" y2="172" stroke-width="2" marker-end="url(#arFair)"/>
  <!-- S -> X1 (proxy path) -->
  <line class="ink-l" x1="140" y1="197" x2="300" y2="123" stroke-width="2" marker-end="url(#arFair)"/>
  <text x="205" y="150" text-anchor="middle" font-size="11" fill="#d9920a" font-style="italic">proxy path</text>
  <!-- S -> X2 (legitimate) -->
  <line class="ink-l" x1="141" y1="222" x2="299" y2="243" stroke-width="2" marker-end="url(#arFair)"/>
  <text x="220" y="248" text-anchor="middle" font-size="11" fill="#1f9d55" font-style="italic">legitimate</text>
  <!-- X1 -> Y -->
  <line class="ink-l" x1="360" y1="123" x2="512" y2="168" stroke-width="2" marker-end="url(#arFair)"/>
  <!-- X2 -> Y -->
  <line class="ink-l" x1="360" y1="240" x2="514" y2="194" stroke-width="2" marker-end="url(#arFair)"/>
</svg>
