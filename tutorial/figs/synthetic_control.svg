<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ax { stroke: #333; }
    .ink-l { stroke: #333; }
    .ink-t { fill: #333; }
    .muted { fill: #777; }
    .faint-l { stroke: #bbb; }
    .faint-t { fill: #999; }
    .arrow { fill: #333; }
    @media (prefers-color-scheme: dark) {
      .ax { stroke: #c9d1d9; }
      .ink-l { stroke: #c9d1d9; }
      .ink-t { fill: #e6edf3; }
      .muted { fill: #9aa4af; }
      .faint-l { stroke: #6b727c; }
      .faint-t { fill: #8b929c; }
      .arrow { fill: #c9d1d9; }
    }
  </style>
  <defs>
    <marker id="arSC" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path class="arrow" d="M0,0 L8,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line class="ax" x1="70" y1="280" x2="520" y2="280" stroke-width="1.5"/>
  <line class="ax" x1="70" y1="40" x2="70" y2="280" stroke-width="1.5"/>
  <text class="ink-t" x="295" y="320" text-anchor="middle" font-size="14">time</text>
  <text class="ink-t" x="28" y="160" text-anchor="middle" font-size="14" transform="rotate(-90 28 160)">outcome Y</text>

  <!-- Intervention line -->
  <line class="ink-l" x1="310" y1="40" x2="310" y2="280" stroke-width="1.2" stroke-dasharray="5,4" opacity="0.7"/>
  <text class="muted" x="310" y="34" text-anchor="middle" font-size="12">intervention</text>

  <!-- Synthetic control: weighted combination (dashed), tracks treated pre-period -->
  <path d="M100,200 Q180,185 260,180 T310,175 Q400,168 490,160" fill="none" stroke="#1f9d55" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="498" y="158" font-size="12" fill="#2bb673">synthetic control</text>

  <!-- Treated unit: matches pre, diverges post -->
  <path d="M100,202 Q180,184 260,179 T310,176" fill="none" stroke="#cc3b3b" stroke-width="2.5"/>
  <path d="M310,176 Q390,140 490,100" fill="none" stroke="#cc3b3b" stroke-width="2.5"/>
  <text x="498" y="100" font-size="12" fill="#e06363">treated unit</text>

  <!-- Donor pool faint lines -->
  <path class="faint-l" d="M100,235 Q200,225 490,215" fill="none" stroke-width="1.2"/>
  <path class="faint-l" d="M100,150 Q200,160 490,140" fill="none" stroke-width="1.2"/>
  <path class="faint-l" d="M100,255 Q200,248 490,235" fill="none" stroke-width="1.2"/>
  <text class="faint-t" x="150" y="262" font-size="11">donor pool</text>

  <!-- Gap = effect -->
  <line class="ink-l" x1="490" y1="100" x2="490" y2="160" stroke-width="1.5" marker-end="url(#arSC)" marker-start="url(#arSC)"/>
  <text class="ink-t" x="470" y="134" text-anchor="end" font-size="13" font-style="italic">&#964;</text>
</svg>
