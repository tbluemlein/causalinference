<svg xmlns="http://www.w3.org/2000/svg" width="820" height="412" viewBox="0 0 820 412" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ink-l { stroke: #333; }
    .ink-t { fill: #333; }
    .muted { fill: #777; }
    .panel { fill: #fbfbfd; stroke: #b9bfd0; }
    .leaf  { fill: #eef2ff; stroke: #b9bfd0; }
    .leafhi{ fill: #fff6e6; stroke: #f59e0b; }
    .root  { fill: #eef2ff; stroke: #3b4cca; }
    .edge  { stroke: #9aa0ac; }
    .nbhd  { fill: #2563eb; }
    .star  { fill: #111; stroke: #111; }
    @media (prefers-color-scheme: dark) {
      .ink-l { stroke: #c9d1d9; }
      .ink-t { fill: #e6edf3; }
      .muted { fill: #9aa4af; }
      .panel { fill: #161b22; stroke: #3a4150; }
      .leaf  { fill: #20294d; stroke: #3a4150; }
      .leafhi{ fill: #3a2f12; stroke: #f59e0b; }
      .root  { fill: #20294d; stroke: #8893e6; }
      .edge  { stroke: #6b7280; }
      .star  { fill: #f0f0f0; stroke: #f0f0f0; }
    }
  </style>
  <defs>
    <marker id="far" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path fill="#888" d="M0,0 L8,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- Titles -->
  <text class="ink-t" x="160" y="26" text-anchor="middle" font-size="14" font-weight="bold">B honest trees</text>
  <text class="muted" x="160" y="42" text-anchor="middle" font-size="11">each drops x into one leaf</text>
  <text class="ink-t" x="575" y="26" text-anchor="middle" font-size="14" font-weight="bold">adaptive neighbourhood of x</text>
  <text class="muted" x="575" y="42" text-anchor="middle" font-size="11">edge width &#8733; weight &#945;&#7497;(x) = co-occupancy across trees</text>

  <!-- ============ LEFT: three mini trees ============ -->
  <!-- helper geometry repeated per tree -->

  <!-- Tree 1 : leaf(x) = {x, j1, j2} (left leaf highlighted) -->
  <text class="muted" x="30" y="78" font-size="12" font-style="italic">tree b = 1</text>
  <circle class="root" cx="160" cy="78" r="9" stroke-width="1.6"/>
  <line class="edge" x1="153" y1="85" x2="118" y2="104" stroke-width="1.4"/>
  <line class="edge" x1="167" y1="85" x2="232" y2="104" stroke-width="1.4"/>
  <rect class="leafhi" x="74" y="106" width="92" height="40" rx="7" stroke-width="1.8"/>
  <rect class="leaf"   x="196" y="106" width="76" height="40" rx="7" stroke-width="1.2"/>
  <!-- members of x's leaf -->
  <path class="star" d="M92,118 l3,7 l7,0 l-6,5 l2,7 l-6,-4 l-6,4 l2,-7 l-6,-5 l7,0 z" transform="translate(0,4) scale(0.9)"/>
  <circle cx="120" cy="126" r="5" fill="#7c3aed"/>
  <circle cx="140" cy="126" r="5" fill="#0d9488"/>
  <!-- other leaf members -->
  <circle cx="220" cy="120" r="4" fill="#aab" opacity="0.6"/>
  <circle cx="240" cy="132" r="4" fill="#aab" opacity="0.6"/>

  <!-- Tree 2 : leaf(x) = {x, j1, j2, j3} (right leaf highlighted) -->
  <text class="muted" x="30" y="190" font-size="12" font-style="italic">tree b = 2</text>
  <circle class="root" cx="160" cy="190" r="9" stroke-width="1.6"/>
  <line class="edge" x1="153" y1="197" x2="108" y2="216" stroke-width="1.4"/>
  <line class="edge" x1="167" y1="197" x2="212" y2="216" stroke-width="1.4"/>
  <rect class="leaf"   x="62" y="218" width="72" height="40" rx="7" stroke-width="1.2"/>
  <rect class="leafhi" x="170" y="218" width="104" height="40" rx="7" stroke-width="1.8"/>
  <circle cx="86" cy="232" r="4" fill="#aab" opacity="0.6"/>
  <circle cx="108" cy="244" r="4" fill="#aab" opacity="0.6"/>
  <path class="star" d="M188,230 l3,7 l7,0 l-6,5 l2,7 l-6,-4 l-6,4 l2,-7 l-6,-5 l7,0 z" transform="translate(0,4) scale(0.9)"/>
  <circle cx="218" cy="238" r="5" fill="#7c3aed"/>
  <circle cx="238" cy="238" r="5" fill="#0d9488"/>
  <circle cx="258" cy="238" r="5" fill="#ea580c"/>

  <!-- Tree 3 : leaf(x) = {x, j1} (left leaf highlighted) -->
  <text class="muted" x="30" y="302" font-size="12" font-style="italic">tree b = 3</text>
  <circle class="root" cx="160" cy="302" r="9" stroke-width="1.6"/>
  <line class="edge" x1="153" y1="309" x2="118" y2="328" stroke-width="1.4"/>
  <line class="edge" x1="167" y1="309" x2="232" y2="328" stroke-width="1.4"/>
  <rect class="leafhi" x="80" y="330" width="80" height="40" rx="7" stroke-width="1.8"/>
  <rect class="leaf"   x="190" y="330" width="82" height="40" rx="7" stroke-width="1.2"/>
  <path class="star" d="M98,342 l3,7 l7,0 l-6,5 l2,7 l-6,-4 l-6,4 l2,-7 l-6,-5 l7,0 z" transform="translate(0,4) scale(0.9)"/>
  <circle cx="128" cy="350" r="5" fill="#7c3aed"/>
  <circle cx="214" cy="344" r="4" fill="#aab" opacity="0.6"/>
  <circle cx="236" cy="356" r="4" fill="#aab" opacity="0.6"/>
  <circle cx="256" cy="346" r="4" fill="#aab" opacity="0.6"/>

  <!-- divider -->
  <line class="edge" x1="312" y1="60" x2="312" y2="380" stroke-width="1" stroke-dasharray="3,4" opacity="0.6"/>
  <text class="muted" x="312" y="404" text-anchor="middle" font-size="11" font-style="italic">tally the leaves &#8594;</text>

  <!-- ============ RIGHT: neighbourhood graph ============ -->
  <rect class="panel" x="360" y="54" width="440" height="330" rx="10" stroke-width="1.4"/>

  <!-- adaptive neighbourhood blob (high-weight region) -->
  <ellipse cx="540" cy="190" rx="118" ry="86" fill="#2563eb" opacity="0.07" stroke="#2563eb" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="470" y="118" font-size="10" fill="#2563eb" font-style="italic">data-driven neighbourhood</text>

  <!-- edges from x (width proportional to weight) -->
  <!-- j1: in all 3 trees -> thickest -->
  <line class="edge" x1="575" y1="210" x2="468" y2="158" stroke-width="5" stroke="#7c3aed" opacity="0.85"/>
  <!-- j2: in 2 trees -->
  <line class="edge" x1="575" y1="210" x2="652" y2="160" stroke-width="3.2" stroke="#0d9488" opacity="0.85"/>
  <!-- j3: in 1 tree -->
  <line class="edge" x1="575" y1="210" x2="658" y2="300" stroke-width="1.6" stroke="#ea580c" opacity="0.85"/>
  <!-- j4: never -> faint dashed -->
  <line class="edge" x1="575" y1="210" x2="452" y2="300" stroke-width="1" stroke="#9aa0ac" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- query point x (star) -->
  <path class="star" d="M575,196 l4,9 l10,0 l-8,7 l3,10 l-9,-6 l-9,6 l3,-10 l-8,-7 l10,0 z"/>
  <text class="ink-t" x="575" y="240" text-anchor="middle" font-size="13" font-style="italic" font-weight="bold">x</text>
  <text class="muted" x="575" y="254" text-anchor="middle" font-size="10">query patient</text>

  <!-- neighbours -->
  <circle cx="468" cy="158" r="8" fill="#7c3aed"/>
  <text class="ink-t" x="468" y="142" text-anchor="middle" font-size="11">j&#8321;</text>
  <text class="muted" x="468" y="178" text-anchor="middle" font-size="9.5">&#945; = 3/3</text>

  <circle cx="652" cy="160" r="8" fill="#0d9488"/>
  <text class="ink-t" x="652" y="144" text-anchor="middle" font-size="11">j&#8322;</text>
  <text class="muted" x="652" y="180" text-anchor="middle" font-size="9.5">&#945; = 2/3</text>

  <circle cx="658" cy="300" r="8" fill="#ea580c"/>
  <text class="ink-t" x="658" y="322" text-anchor="middle" font-size="11">j&#8323;</text>
  <text class="muted" x="658" y="288" text-anchor="middle" font-size="9.5">&#945; = 1/3</text>

  <circle cx="452" cy="300" r="8" fill="#9aa0ac"/>
  <text class="ink-t" x="452" y="322" text-anchor="middle" font-size="11">j&#8324;</text>
  <text class="muted" x="452" y="288" text-anchor="middle" font-size="9.5">&#945; &#8776; 0</text>

  <text class="muted" x="580" y="368" text-anchor="middle" font-size="10.5">Patients sharing x's leaf more often weigh more &#8212; a learned, local match.</text>
</svg>
