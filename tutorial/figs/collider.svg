<svg xmlns="http://www.w3.org/2000/svg" width="420" height="270" viewBox="0 0 420 270" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ink-l { stroke: #333; }
    .ink-t { fill: #333; }
    .muted { fill: #777; }
    .muted-l { stroke: #777; }
    .arrow { fill: #333; }
    @media (prefers-color-scheme: dark) {
      .ink-l { stroke: #c9d1d9; }
      .ink-t { fill: #e6edf3; }
      .muted { fill: #9aa4af; }
      .muted-l { stroke: #9aa4af; }
      .arrow { fill: #c9d1d9; }
    }
  </style>
  <defs>
    <marker id="arCol" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path class="arrow" d="M0,0 L9,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- X -->
  <circle cx="100" cy="62" r="32" fill="#eef1f4" stroke="#9aa4af" stroke-width="2"/>
  <text x="100" y="68" text-anchor="middle" font-size="20" fill="#3a4149">X</text>

  <!-- Y -->
  <circle cx="320" cy="62" r="32" fill="#eef1f4" stroke="#9aa4af" stroke-width="2"/>
  <text x="320" y="68" text-anchor="middle" font-size="20" fill="#3a4149">Y</text>

  <!-- C (Collider) -->
  <circle cx="210" cy="200" r="32" fill="#f3eafa" stroke="#9b59b6" stroke-width="2"/>
  <text x="210" y="206" text-anchor="middle" font-size="20" fill="#6f3d93">C</text>
  <text class="muted" x="210" y="256" text-anchor="middle" font-size="12">collider</text>

  <line class="ink-l" x1="120" y1="86" x2="188" y2="176" stroke-width="2" marker-end="url(#arCol)"/>
  <line class="ink-l" x1="300" y1="86" x2="232" y2="176" stroke-width="2" marker-end="url(#arCol)"/>
</svg>
