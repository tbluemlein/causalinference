<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ax { stroke: #333; }
    .ink-l { stroke: #333; }
    .ink-t { fill: #333; }
    .muted { fill: #777; }
    .muted-l { stroke: #777; }
    @media (prefers-color-scheme: dark) {
      .ax { stroke: #c9d1d9; }
      .ink-l { stroke: #c9d1d9; }
      .ink-t { fill: #e6edf3; }
      .muted { fill: #9aa4af; }
      .muted-l { stroke: #9aa4af; }
    }
  </style>

  <text class="ink-t" x="280" y="24" text-anchor="middle" font-size="15" font-weight="bold">Worst-case bounds tighten as assumptions are added</text>

  <!-- Row labels -->
  <g font-size="12" class="ink-t" text-anchor="end">
    <text x="196" y="78">No assumptions</text>
    <text x="196" y="146">+ bounded outcome &amp; monotonicity</text>
    <text x="196" y="214">+ instrument (point identified)</text>
  </g>

  <!-- effect axis (tau from -4 to +8) -->
  <line class="ax" x1="206" y1="262" x2="510" y2="262" stroke-width="1.5"/>
  <g font-size="11" class="muted" text-anchor="middle">
    <text x="217" y="280">&#8722;4</text>
    <text x="290" y="280">0</text>
    <text x="363" y="280">3</text>
    <text x="510" y="280">8</text>
  </g>
  <text class="ink-t" x="358" y="302" text-anchor="middle" font-size="13">treatment effect &#964;</text>

  <!-- zero reference line -->
  <line class="muted-l" x1="290" y1="48" x2="290" y2="262" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.7"/>
  <text class="muted" x="290" y="44" text-anchor="middle" font-size="11">&#964; = 0</text>

  <!-- point-estimate reference line at tau = 3 -->
  <line x1="363" y1="48" x2="363" y2="240" stroke="#6d6e71" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="363" y="44" text-anchor="middle" font-size="11" fill="#6d6e71" font-weight="bold">&#964;&#770;</text>

  <!-- Row 1: no assumptions, wide bar crossing zero (tau in [-3, 7]), most transparent -->
  <line x1="217" y1="73" x2="437" y2="73" stroke="#7d9f17" stroke-width="9" opacity="0.30" stroke-linecap="round"/>
  <line x1="217" y1="64" x2="217" y2="82" stroke="#7d9f17" stroke-width="2" opacity="0.55"/>
  <line x1="437" y1="64" x2="437" y2="82" stroke="#7d9f17" stroke-width="2" opacity="0.55"/>
  <text class="muted" x="446" y="77" font-size="10.5">sign unknown</text>

  <!-- Row 2: bounded outcome + monotonicity (tau in [0.5, 5.5]), mid transparency -->
  <line x1="300" y1="141" x2="437" y2="141" stroke="#7d9f17" stroke-width="9" opacity="0.6" stroke-linecap="round"/>
  <line x1="300" y1="132" x2="300" y2="150" stroke="#7d9f17" stroke-width="2" opacity="0.8"/>
  <line x1="437" y1="132" x2="437" y2="150" stroke="#7d9f17" stroke-width="2" opacity="0.8"/>
  <text class="muted" x="446" y="145" font-size="10.5">effect now positive</text>

  <!-- Row 3: instrument / point identified, fully opaque -->
  <line x1="348" y1="209" x2="378" y2="209" stroke="#7d9f17" stroke-width="9" stroke-linecap="round"/>
  <circle cx="363" cy="209" r="5" fill="#7d9f17" stroke="#ffffff" stroke-width="1.4"/>
  <text class="muted" x="388" y="213" font-size="10.5">single value</text>
</svg>
