<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arSC" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="70" y1="280" x2="520" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="70" y2="280" stroke="#333" stroke-width="1.5"/>
  <text x="295" y="320" text-anchor="middle" font-size="14" fill="#333">time</text>
  <text x="28" y="160" text-anchor="middle" font-size="14" fill="#333" transform="rotate(-90 28 160)">outcome Y</text>

  <!-- Intervention line -->
  <line x1="310" y1="40" x2="310" y2="280" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="310" y="34" text-anchor="middle" font-size="12" fill="#777">intervention</text>

  <!-- Synthetic control: weighted combination (dashed), tracks treated pre-period -->
  <path d="M100,200 Q180,185 260,180 T310,175 Q400,168 490,160" fill="none" stroke="#1f9d55" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="498" y="158" font-size="12" fill="#136c3a">synthetic control</text>

  <!-- Treated unit: matches pre, diverges post -->
  <path d="M100,202 Q180,184 260,179 T310,176" fill="none" stroke="#cc3b3b" stroke-width="2.5"/>
  <path d="M310,176 Q390,140 490,100" fill="none" stroke="#cc3b3b" stroke-width="2.5"/>
  <text x="498" y="100" font-size="12" fill="#8a1f1f">treated unit</text>

  <!-- Donor pool faint lines -->
  <path d="M100,235 Q200,225 490,215" fill="none" stroke="#bbb" stroke-width="1.2"/>
  <path d="M100,150 Q200,160 490,140" fill="none" stroke="#bbb" stroke-width="1.2"/>
  <path d="M100,255 Q200,248 490,235" fill="none" stroke="#bbb" stroke-width="1.2"/>
  <text x="150" y="262" font-size="11" fill="#999">donor pool</text>

  <!-- Gap = effect -->
  <line x1="490" y1="100" x2="490" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arSC)" marker-start="url(#arSC)"/>
  <text x="470" y="134" text-anchor="end" font-size="13" fill="#333" font-style="italic">&#964;</text>
</svg>
