<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===================== Boxes ===================== -->
  <!-- A: data -->
  <rect x="310" y="30" width="300" height="52" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.6"/>
  <text x="460" y="61" text-anchor="middle" font-size="14" fill="#0b3d91">Observational data  (X · T · Y)</text>

  <!-- B: encode DAG -->
  <rect x="280" y="124" width="360" height="52" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.6"/>
  <text x="460" y="155" text-anchor="middle" font-size="14" fill="#0b3d91">1 · Encode assumptions in a causal DAG</text>

  <!-- Group: validate -->
  <rect x="40" y="212" width="840" height="140" rx="10" fill="#fafafa" stroke="#bbbbbb" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="460" y="236" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">2 · Validate the four identification assumptions</text>

  <!-- C1 -->
  <rect x="60" y="254" width="170" height="80" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="1.6"/>
  <text x="145" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064">Consistency</text>
  <text x="145" y="310" text-anchor="middle" font-size="11" fill="#00474f">effect by sub-type</text>

  <!-- C2 -->
  <rect x="270" y="254" width="170" height="80" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="1.6"/>
  <text x="355" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064">SUTVA</text>
  <text x="355" y="310" text-anchor="middle" font-size="11" fill="#00474f">spillover check</text>

  <!-- C3 -->
  <rect x="480" y="254" width="170" height="80" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="1.6"/>
  <text x="565" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064">Positivity</text>
  <text x="565" y="310" text-anchor="middle" font-size="11" fill="#00474f">propensity overlap</text>

  <!-- C4 -->
  <rect x="690" y="254" width="170" height="80" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="1.6"/>
  <text x="775" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064">Exchangeability</text>
  <text x="775" y="310" text-anchor="middle" font-size="11" fill="#00474f">balance + sensitivity</text>

  <!-- D: decision diamond -->
  <polygon points="460,378 590,430 460,482 330,430" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.6"/>
  <text x="460" y="426" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3d00">3 · Any assumption</text>
  <text x="460" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3d00">violated?</text>

  <!-- F: remedy -->
  <rect x="40" y="540" width="300" height="56" rx="8" fill="#fdecea" stroke="#e53935" stroke-width="1.6"/>
  <text x="190" y="564" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8e1d18">Apply remedy</text>
  <text x="190" y="582" text-anchor="middle" font-size="11" fill="#8e1d18">redefine · cluster · trim · reweight · IV</text>

  <!-- G: re-estimate -->
  <rect x="40" y="630" width="300" height="56" rx="8" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.6"/>
  <text x="190" y="654" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#311b6b">Re-estimate &amp; quantify robustness</text>
  <text x="190" y="672" text-anchor="middle" font-size="11" fill="#311b6b">E-value · Γ · partial R²</text>

  <!-- E: report estimate -->
  <rect x="570" y="630" width="260" height="56" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.6"/>
  <text x="700" y="654" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1b5e20">Report adjusted</text>
  <text x="700" y="672" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1b5e20">effect estimate</text>

  <!-- H: transparent report -->
  <rect x="250" y="720" width="420" height="56" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="460" y="744" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Transparent report</text>
  <text x="460" y="762" text-anchor="middle" font-size="11" fill="#1b5e20">estimate + diagnostics + sensitivity bounds</text>

  <!-- ===================== Arrows ===================== -->
  <line x1="460" y1="82"  x2="460" y2="121" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="460" y1="176" x2="460" y2="209" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="460" y1="352" x2="460" y2="375" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- D -> F (Yes) -->
  <polyline points="460,482 460,512 190,512 190,537" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="300" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Yes</text>

  <!-- D -> E (No) -->
  <polyline points="590,430 700,430 700,627" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="648" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">No</text>

  <!-- F -> G -->
  <line x1="190" y1="596" x2="190" y2="627" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- G -> E -->
  <line x1="340" y1="658" x2="567" y2="658" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- E -> H -->
  <polyline points="700,686 700,704 460,704 460,717" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>
</svg>
